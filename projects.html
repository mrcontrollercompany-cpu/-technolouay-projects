<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechnoLouay Academy — مشاريع هندسية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --bg2: #0a0f1e;
  --bg3: #0d1526;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #06ffa5;
  --text: #e2e8f0;
  --muted: #64748b;
  --card-bg: rgba(13,21,38,0.8);
  --border: rgba(0,212,255,0.12);
  --border-hover: rgba(0,212,255,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(5,8,16,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 2px;
  text-decoration: none;
  text-shadow: 0 0 20px rgba(0,212,255,0.4);
  cursor: pointer;
}
.logo span { color: var(--accent3); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-academy-btn {
  padding: 7px 18px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-academy-btn:hover {
  background: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 16px rgba(0,212,255,0.3);
}

/* ===== HERO MINI ===== */
.hero-mini {
  position: relative;
  z-index: 1;
  padding: 110px 32px 60px;
  text-align: center;
  overflow: hidden;
}

.hero-mini::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.page-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  border: 1px solid rgba(0,212,255,0.25);
  border-radius: 100px;
  font-size: 0.75rem;
  color: var(--accent);
  background: rgba(0,212,255,0.05);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.dot-live {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent3);
  box-shadow: 0 0 8px var(--accent3);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hero-mini h1 {
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 900;
  margin-bottom: 12px;
}
.hero-mini h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-mini p {
  color: var(--muted);
  font-size: 0.95rem;
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.8;
}

/* ===== FILTERS ===== */
.filters-wrap {
  position: relative;
  z-index: 1;
  padding: 0 32px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.search-box {
  position: relative;
  width: 100%;
  max-width: 440px;
}

.search-box input {
  width: 100%;
  padding: 11px 20px 11px 44px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.3s;
  text-align: right;
}
.search-box input::placeholder { color: var(--muted); }
.search-box input:focus { border-color: var(--accent); }

.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 1rem;
  pointer-events: none;
}

.filter-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-btn {
  padding: 7px 18px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.3s;
}
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 14px rgba(0,212,255,0.3);
}

/* ===== PROJECTS GRID ===== */
.projects-section {
  position: relative;
  z-index: 1;
  padding: 0 32px 80px;
  max-width: 1200px;
  margin: 0 auto;
}

.projects-count {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 24px;
  text-align: center;
}
.projects-count span { color: var(--accent); font-family: 'Orbitron', monospace; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Project Card */
.project-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s;
  animation: fadeUp 0.5s ease both;
}

.project-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,255,0.08);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  display: block;
  background: var(--bg3);
}

.card-img-placeholder {
  width: 100%;
  height: 190px;
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
}

.card-body {
  padding: 18px;
}

.card-category {
  font-size: 0.7rem;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-category::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.card-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 10px;
  color: var(--text);
}

.card-desc {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 14px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  padding: 3px 10px;
  background: rgba(0,212,255,0.07);
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: 100px;
  font-size: 0.68rem;
  color: var(--accent);
}

.card-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.has-video {
  font-size: 0.72rem;
  color: #ff4444;
  display: flex;
  align-items: center;
  gap: 4px;
}

.has-insta {
  font-size: 0.72rem;
  color: #e1306c;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-arrow {
  margin-right: auto;
  font-size: 0.75rem;
  color: var(--muted);
  transition: all 0.3s;
}
.project-card:hover .card-arrow {
  color: var(--accent);
  transform: translateX(-4px);
}

/* No results */
.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  display: none;
  grid-column: 1/-1;
}
.no-results.show { display: block; }
.no-results-icon { font-size: 3rem; margin-bottom: 16px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.3s ease;
  position: relative;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.modal-close {
  position: absolute;
  top: 16px; left: 16px;
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s;
  z-index: 10;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); }

.modal-img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 16px 16px 0 0;
  display: block;
}

.modal-img-placeholder {
  width: 100%;
  height: 200px;
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  border-radius: 16px 16px 0 0;
}

.modal-body {
  padding: 28px;
}

.modal-category {
  font-size: 0.72rem;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.modal-category::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}

.modal-title {
  font-size: 1.4rem;
  font-weight: 900;
  margin-bottom: 16px;
  line-height: 1.4;
}

.modal-desc {
  color: var(--muted);
  font-size: 0.92rem;
  line-height: 1.9;
  margin-bottom: 24px;
}

.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}

/* YouTube embed */
.youtube-wrap {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.youtube-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

.modal-links {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.modal-link-btn {
  padding: 10px 22px;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s;
}

.btn-yt {
  background: rgba(255,0,0,0.1);
  border: 1px solid rgba(255,0,0,0.3);
  color: #ff4444;
}
.btn-yt:hover { background: rgba(255,0,0,0.2); border-color: #ff4444; }

.btn-ig {
  background: rgba(225,48,108,0.1);
  border: 1px solid rgba(225,48,108,0.3);
  color: #e1306c;
}
.btn-ig:hover { background: rgba(225,48,108,0.2); border-color: #e1306c; }

/* ===== FOOTER ===== */
footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--border);
  padding: 40px 32px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  background: rgba(5,8,16,0.7);
}

.footer-logo {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  color: var(--accent);
  letter-spacing: 2px;
}

.footer-social {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.social-btn {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}
.social-btn svg {
  width: 24px;
  height: 24px;
  transition: all 0.3s;
}
.social-btn:hover { transform: translateY(-6px) scale(1.05); }

.social-btn.youtube svg { fill: #ff4444; }
.social-btn.youtube:hover { background: rgba(255,0,0,0.15); border-color: #ff0000; box-shadow: 0 8px 24px rgba(255,0,0,0.3); }
.social-btn.youtube:hover svg { fill: #ff0000; }

.social-btn.instagram svg { fill: #e1306c; }
.social-btn.instagram:hover { background: rgba(225,48,108,0.15); border-color: #e1306c; box-shadow: 0 8px 24px rgba(225,48,108,0.3); }
.social-btn.instagram:hover svg { fill: #ff3676; }

.social-btn.whatsapp svg { fill: #25d366; }
.social-btn.whatsapp:hover { background: rgba(37,211,102,0.15); border-color: #25d366; box-shadow: 0 8px 24px rgba(37,211,102,0.3); }
.social-btn.whatsapp:hover svg { fill: #25f376; }

.social-btn.telegram svg { fill: #229ed9; }
.social-btn.telegram:hover { background: rgba(34,158,217,0.15); border-color: #229ed9; box-shadow: 0 8px 24px rgba(34,158,217,0.3); }
.social-btn.telegram:hover svg { fill: #2aaee9; }

.social-btn.tiktok svg { fill: #e2e8f0; }
.social-btn.tiktok:hover { background: rgba(255,255,255,0.1); border-color: #fff; box-shadow: 0 8px 24px rgba(0,242,234,0.3); }
.social-btn.tiktok:hover svg { fill: #fff; }

.footer-copy {
  font-size: 0.72rem;
  color: var(--muted);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .hero-mini { padding: 90px 16px 40px; }
  .filters-wrap { padding: 0 16px 32px; }
  .projects-section { padding: 0 16px 60px; }
  footer { padding: 32px 16px; text-align: center; }
  .modal-body { padding: 20px; }
  .modal-title { font-size: 1.1rem; }
}
</style>
</head>

<script>
let allProjects = [];
let currentFilter = 'الكل';

// Category icons
const catIcons = {
  'طبية': '🏥',
  'ميكاترونكس': '🤖',
  'ذكاء اصطناعي': '🧠',
  'طاقة': '⚡',
  'حواسيب': '💻',
};

function getCatIcon(cat) {
  return catIcons[cat] || '🔧';
}

// Load projects from JSON
async function loadProjects() {
  try {
    const res = await fetch('projects.json?v=' + Date.now());
    allProjects = await res.json();
    filterProjects();
  } catch(e) {
    console.error('خطأ في تحميل المشاريع:', e);
    document.getElementById('projectsGrid').innerHTML = `
      <div class="no-results show">
        <div class="no-results-icon">⚠️</div>
        <p>تعذّر تحميل المشاريع</p>
      </div>`;
  }
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProjects();
}

function filterProjects() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = allProjects;

  if (currentFilter !== 'الكل') {
    filtered = filtered.filter(p => p.category === currentFilter);
  }

  if (q) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      (p.tags && p.tags.some(t => t.toLowerCase().includes(q)))
    );
  }

  renderProjects(filtered);
}

function renderProjects(projects) {
  const grid = document.getElementById('projectsGrid');
  document.getElementById('countNum').textContent = projects.length;

  if (projects.length === 0) {
    grid.innerHTML = `<div class="no-results show"><div class="no-results-icon">🔭</div><p>لا توجد مشاريع مطابقة</p></div>`;
    return;
  }

  grid.innerHTML = projects.map((p, i) => `
    <div class="project-card" onclick="openModal(${p.id})" style="animation-delay:${i*0.06}s">
      ${p.images && p.images[0]
        ? `<img class="card-img" src="${p.images[0]}" alt="${p.title}" loading="lazy" onerror="this.parentElement.querySelector('.card-img-placeholder') && (this.style.display='none')">`
        : `<div class="card-img-placeholder">${getCatIcon(p.category)}</div>`
      }
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.description}</div>
        <div class="card-tags">
          ${(p.tags || []).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        ${p.youtube ? `<span class="has-video">▶ فيديو</span>` : ''}
        ${p.instagram ? `<span class="has-insta">📸 إنستغرام</span>` : ''}
        <span class="card-arrow">← عرض التفاصيل</span>
      </div>
    </div>
  `).join('');
}

function getYoutubeId(url) {
  if (!url) return null;
  const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&\n?#]+)/);
  return match ? match[1] : null;
}

function openModal(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;

  const ytId = getYoutubeId(p.youtube);

  document.getElementById('modalContent').innerHTML = `
    ${p.images && p.images[0]
      ? `<img class="modal-img" src="${p.images[0]}" alt="${p.title}">`
      : `<div class="modal-img-placeholder">${getCatIcon(p.category)}</div>`
    }
    <div class="modal-body">
      <div class="modal-category">${p.category}</div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-desc">${p.description}</div>
      <div class="modal-tags">
        ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      ${ytId ? `
        <div class="youtube-wrap">
          <iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
      ` : ''}
      <div class="modal-links">
        ${p.youtube ? `<a href="${p.youtube}" target="_blank" class="modal-link-btn btn-yt">▶ شاهد على يوتيوب</a>` : ''}
        ${p.instagram ? `<a href="${p.instagram}" target="_blank" class="modal-link-btn btn-ig">📸 إنستغرام</a>` : ''}
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  // Stop YouTube video
  const iframe = document.querySelector('.youtube-wrap iframe');
  if (iframe) iframe.src = iframe.src;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function goHome() {
  currentFilter = 'الكل';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach((b,i) => {
    b.classList.toggle('active', i === 0);
  });
  filterProjects();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
loadProjects();
</script>
